<svg xmlns="http://www.w3.org/2000/svg" width="760" height="226" viewBox="0 0 760 226" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/></filter></defs>
  <rect x="10" y="8" width="740" height="206" rx="10" fill="#0d1117" stroke="#30363d" filter="url(#sh)"/>
  <circle cx="36" cy="30" r="6" fill="#ff5f56"/><circle cx="58" cy="30" r="6" fill="#ffbd2e"/><circle cx="80" cy="30" r="6" fill="#27c93f"/>
  <text x="380" y="35" text-anchor="middle" fill="#6e7681" font-size="12">zsh</text>
  <line x1="10" y1="50" x2="750" y2="50" stroke="#21262d"/>
  <text x="34" y="78" xml:space="preserve" fill="#8b949e"># Keep projects in ~/code and open with Sublime Text</text>
  <text x="34" y="102" xml:space="preserve"><tspan fill="#7ee787">$ </tspan><tspan fill="#ff7b72">export </tspan><tspan fill="#c9d1d9">SPROUT_PROJECTS_DIR=</tspan><tspan fill="#a5d6ff">"$HOME/code"</tspan></text>
  <text x="34" y="126" xml:space="preserve"><tspan fill="#7ee787">$ </tspan><tspan fill="#ff7b72">export </tspan><tspan fill="#c9d1d9">SPROUT_EDITOR=</tspan><tspan fill="#a5d6ff">"subl"</tspan></text>
  <text x="34" y="174" xml:space="preserve" fill="#8b949e"># Scaffold without opening anything</text>
  <text x="34" y="198" xml:space="preserve"><tspan fill="#7ee787">$ </tspan><tspan fill="#c9d1d9">SPROUT_EDITOR=none sprout scratch py</tspan></text>
</svg>
